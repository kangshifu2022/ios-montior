name: iOS Build (Manual Signing - AdHoc)

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Certificate & Profile
        env:
          P12_BASE64: ${{ secrets.CERTIFICATES_P12 }}
          P12_PASSWORD: ${{ secrets.CERTIFICATES_P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          echo "$PROFILE_BASE64" | base64 --decode > profile.mobileprovision

          security create-keychain -p "1234" build.keychain
          security unlock-keychain -p "1234" build.keychain
          security set-keychain-settings build.keychain

          security import cert.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -s build.keychain
          security default-keychain -s build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project test/test.xcodeproj \
            -scheme test \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            CODE_SIGN_STYLE=Manual

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>release-testing</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/exportOptions.plist \
            -exportPath $RUNNER_TEMP/build

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: $RUNNER_TEMP/build/*.ipa
