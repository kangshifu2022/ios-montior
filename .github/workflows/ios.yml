name: iOS Build (Auto Signing)

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ==============================
      # 1. Archive（自动签名）
      # ==============================
      - name: Build Archive (Auto Signing)
        run: |
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" > $RUNNER_TEMP/AuthKey.p8

          xcodebuild archive \
            -project test/test.xcodeproj \
            -scheme test \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath $RUNNER_TEMP/AuthKey.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      # ==============================
      # 2. Export IPA（自动签名，关键修复点）
      # ==============================
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
          "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>

              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/exportOptions.plist \
            -exportPath $RUNNER_TEMP/build

      # ==============================
      # 3. 上传 IPA
      # ==============================
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: $RUNNER_TEMP/build/*.ipa
