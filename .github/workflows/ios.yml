name: Build Ad Hoc IPA

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ios-adhoc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT_PATH: test/test.xcodeproj
  SCHEME: test

jobs:
  build-ipa:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Set build paths
        run: |
          echo "ARCHIVE_PATH=$RUNNER_TEMP/test.xcarchive" >> "$GITHUB_ENV"
          echo "EXPORT_PATH=$RUNNER_TEMP/ipa" >> "$GITHUB_ENV"

      - name: Install certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_PROVISIONING_PROFILE_BASE64: ${{ secrets.BUILD_PROVISIONING_PROFILE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$BUILD_CERTIFICATE_BASE64" || -z "$BUILD_PROVISIONING_PROFILE_BASE64" || -z "$P12_PASSWORD" ]]; then
            echo "Missing required signing secrets."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/signing_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          LOGIN_KEYCHAIN_PATH="$(security login-keychain -d user | tr -d '"')"
          EFFECTIVE_KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$(openssl rand -base64 24)}"

          printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null || printf '%s' "$BUILD_CERTIFICATE_BASE64" | base64 -D > "$CERT_PATH"
          printf '%s' "$BUILD_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH" 2>/dev/null || printf '%s' "$BUILD_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$EFFECTIVE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$EFFECTIVE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$EFFECTIVE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$PROFILE_PLIST")
          APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST")
          PROFILE_BUNDLE_ID="${APP_IDENTIFIER#*.}"

          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "LOGIN_KEYCHAIN_PATH=$LOGIN_KEYCHAIN_PATH"
            echo "PROFILE_UUID=$PROFILE_UUID"
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "TEAM_ID=$TEAM_ID"
            echo "PROFILE_BUNDLE_ID=$PROFILE_BUNDLE_ID"
          } >> "$GITHUB_ENV"

      - name: Resolve project settings
        run: |
          BUILD_SETTINGS="$(xcodebuild -showBuildSettings -project "$PROJECT_PATH" -target "$SCHEME" -configuration Release -destination "generic/platform=iOS")"
          PROJECT_BUNDLE_ID="$(printf '%s\n' "$BUILD_SETTINGS" | awk -F ' = ' '/PRODUCT_BUNDLE_IDENTIFIER = / && $2 != "NO" {print $2; exit}')"
          APP_TITLE="$(printf '%s\n' "$BUILD_SETTINGS" | awk -F ' = ' '/PRODUCT_NAME = / {print $2; exit}')"
          APP_VERSION="$(printf '%s\n' "$BUILD_SETTINGS" | awk -F ' = ' '/MARKETING_VERSION = / {print $2; exit}')"

          if [[ -z "$PROJECT_BUNDLE_ID" ]]; then
            echo "Failed to resolve PRODUCT_BUNDLE_IDENTIFIER from project settings."
            exit 1
          fi

          APP_TITLE="${APP_TITLE%\"}"
          APP_TITLE="${APP_TITLE#\"}"
          APP_VERSION="${APP_VERSION:-$GITHUB_RUN_NUMBER}"

          if [[ "$PROFILE_BUNDLE_ID" == *"*" ]]; then
            PROFILE_PREFIX="${PROFILE_BUNDLE_ID%\*}"
            if [[ "$PROJECT_BUNDLE_ID" != "$PROFILE_PREFIX"* ]]; then
              echo "Provisioning profile bundle ID $PROFILE_BUNDLE_ID does not match project bundle ID $PROJECT_BUNDLE_ID."
              exit 1
            fi
          elif [[ "$PROFILE_BUNDLE_ID" != "$PROJECT_BUNDLE_ID" ]]; then
            echo "Provisioning profile bundle ID $PROFILE_BUNDLE_ID does not match project bundle ID $PROJECT_BUNDLE_ID."
            exit 1
          fi

          echo "PROJECT_BUNDLE_ID=$PROJECT_BUNDLE_ID" >> "$GITHUB_ENV"
          echo "APP_TITLE=$APP_TITLE" >> "$GITHUB_ENV"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME"

      - name: Create export options plist
        run: |
          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/exportOptions.plist"

          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$PROJECT_BUNDLE_ID</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          echo "EXPORT_OPTIONS_PLIST=$EXPORT_OPTIONS_PLIST" >> "$GITHUB_ENV"

      - name: Configure signing for app target
        run: |
          perl -0pi -e 's/DEVELOPMENT_TEAM = [A-Z0-9]+;/DEVELOPMENT_TEAM = '"$TEAM_ID"';/g' "$PROJECT_PATH/project.pbxproj"
          perl -0pi -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "'"$PROFILE_NAME"'";/g' "$PROJECT_PATH/project.pbxproj"

      - name: Archive app
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            clean archive \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-adhoc-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: error
          retention-days: 1

      - name: Prepare install site
        env:
          IOS_INSTALL_BASE_URL: ${{ vars.IOS_INSTALL_BASE_URL }}
        run: |
          SITE_DIR="$RUNNER_TEMP/install-site"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_URL="${IOS_INSTALL_BASE_URL:-https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}}"
          BASE_URL="${BASE_URL%/}"
          IPA_PATH="$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' -print -quit)"
          IPA_NAME="$(basename "$IPA_PATH")"
          MANIFEST_URL="$BASE_URL/manifest.plist"
          IPA_URL="$BASE_URL/$IPA_NAME"
          BUILD_SHA="${GITHUB_SHA::7}"

          if [[ -z "$IPA_PATH" || ! -f "$IPA_PATH" ]]; then
            echo "No IPA found at $EXPORT_PATH"
            exit 1
          fi

          mkdir -p "$SITE_DIR"
          cp "$IPA_PATH" "$SITE_DIR/$IPA_NAME"

          cat > "$SITE_DIR/manifest.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>items</key>
            <array>
              <dict>
                <key>assets</key>
                <array>
                  <dict>
                    <key>kind</key>
                    <string>software-package</string>
                    <key>url</key>
                    <string>$IPA_URL</string>
                  </dict>
                </array>
                <key>metadata</key>
                <dict>
                  <key>bundle-identifier</key>
                  <string>$PROJECT_BUNDLE_ID</string>
                  <key>bundle-version</key>
                  <string>$GITHUB_RUN_NUMBER</string>
                  <key>kind</key>
                  <string>software</string>
                  <key>title</key>
                  <string>$APP_TITLE</string>
                </dict>
              </dict>
            </array>
          </dict>
          </plist>
          EOF

          cat > "$SITE_DIR/index.html" <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>$APP_TITLE Install</title>
            <style>
              :root {
                color-scheme: light;
                --bg: #f3f7fb;
                --panel: #ffffff;
                --text: #10233a;
                --muted: #5c6d82;
                --accent: #0a84ff;
                --accent-strong: #0066cc;
                --line: #dce6f0;
              }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background:
                  radial-gradient(circle at top, rgba(10, 132, 255, 0.14), transparent 32rem),
                  linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
                color: var(--text);
              }
              main {
                max-width: 42rem;
                margin: 0 auto;
                padding: 3rem 1.25rem 4rem;
              }
              .card {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 1.5rem;
                padding: 1.5rem;
                box-shadow: 0 18px 48px rgba(16, 35, 58, 0.08);
              }
              h1 {
                margin: 0 0 0.75rem;
                font-size: clamp(2rem, 5vw, 2.8rem);
                line-height: 1.05;
              }
              p {
                margin: 0.75rem 0;
                color: var(--muted);
                line-height: 1.6;
              }
              .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 0.75rem;
                margin: 1.5rem 0;
              }
              .button {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 3.25rem;
                padding: 0 1.25rem;
                border-radius: 999px;
                border: 1px solid transparent;
                font-weight: 700;
                text-decoration: none;
              }
              .button.primary {
                background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%);
                color: #fff;
              }
              .button.secondary {
                background: #fff;
                border-color: var(--line);
                color: var(--text);
              }
              .meta {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
                gap: 0.75rem;
                margin-top: 1.5rem;
              }
              .meta div {
                padding: 0.9rem 1rem;
                border-radius: 1rem;
                background: #f8fbff;
                border: 1px solid var(--line);
              }
              .meta strong {
                display: block;
                margin-bottom: 0.3rem;
                font-size: 0.78rem;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: var(--muted);
              }
              code {
                font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 0.92rem;
              }
            </style>
          </head>
          <body>
            <main>
              <section class="card">
                <p>Open this page in Safari on your iPhone or iPad.</p>
                <h1>Install $APP_TITLE</h1>
                <p>This build is published from GitHub Actions as an Ad Hoc install package. If your device UDID is included in the provisioning profile, tap Install and iOS will start the app installation.</p>
                <div class="actions">
                  <a class="button primary" href="itms-services://?action=download-manifest&amp;url=$MANIFEST_URL">Install on iPhone/iPad</a>
                  <a class="button secondary" href="$IPA_URL">Download IPA</a>
                </div>
                <div class="meta">
                  <div>
                    <strong>Version</strong>
                    <span>$APP_VERSION</span>
                  </div>
                  <div>
                    <strong>Build</strong>
                    <span>$GITHUB_RUN_NUMBER</span>
                  </div>
                  <div>
                    <strong>Commit</strong>
                    <code>$BUILD_SHA</code>
                  </div>
                </div>
              </section>
            </main>
          </body>
          </html>
          EOF

      - name: Upload install site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ runner.temp }}/install-site
          retention-days: 1

      - name: Cleanup signing assets
        if: ${{ always() }}
        run: |
          if [[ -n "${LOGIN_KEYCHAIN_PATH:-}" ]]; then
            security default-keychain -d user -s "$LOGIN_KEYCHAIN_PATH" || true
          fi
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          if [[ -n "${PROFILE_UUID:-}" ]]; then
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          fi

  deploy-install-page:
    needs: build-ipa
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write deployment summary
        run: |
          {
            echo "## iOS Install Page"
            echo ""
            echo "Install URL: ${{ steps.deployment.outputs.page_url }}"
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    needs:
      - build-ipa
      - deploy-install-page
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Bark notification
        env:
          SUCCESS_BARK_URL: https://api.day.app/7Gm7m5C7aYeiiZBxhP6koK/构建成功?sound=minuet
          FAILURE_BARK_URL: https://api.day.app/7Gm7m5C7aYeiiZBxhP6koK/构建失败?level=critical&volume=10
          BUILD_RESULT: ${{ needs.build-ipa.result }}
          DEPLOY_RESULT: ${{ needs.deploy-install-page.result }}
          PAGE_URL: ${{ needs.deploy-install-page.outputs.page_url }}
        run: |
          if [[ -z "${SUCCESS_BARK_URL:-}" || -z "${FAILURE_BARK_URL:-}" ]]; then
            echo "Bark URLs are not fully set; skipping Bark notification."
            exit 0
          fi

          REF_NAME="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"

          if [[ "$BUILD_RESULT" == "success" && ( "$DEPLOY_RESULT" == "success" || "$DEPLOY_RESULT" == "skipped" ) ]]; then
            NOTIFY_URL="$SUCCESS_BARK_URL"

            if [[ "$DEPLOY_RESULT" == "success" ]]; then
              printf -v BODY 'iOS Ad Hoc 工作流成功。\n分支: %s\nBuild: #%s\nBuild 结果: %s\nDeploy: %s' "$REF_NAME" "$GITHUB_RUN_NUMBER" "$BUILD_RESULT" "$DEPLOY_RESULT"
            else
              printf -v BODY 'iOS Ad Hoc 构建成功，安装页按预期跳过。\n分支: %s\nBuild: #%s\nBuild 结果: %s\nDeploy: %s' "$REF_NAME" "$GITHUB_RUN_NUMBER" "$BUILD_RESULT" "$DEPLOY_RESULT"
            fi
          elif [[ "$BUILD_RESULT" == "cancelled" || "$DEPLOY_RESULT" == "cancelled" ]]; then
            NOTIFY_URL="$FAILURE_BARK_URL"
            printf -v BODY 'iOS Ad Hoc 工作流未完成。\n分支: %s\nBuild: #%s\nBuild 结果: %s\nDeploy: %s' "$REF_NAME" "$GITHUB_RUN_NUMBER" "$BUILD_RESULT" "$DEPLOY_RESULT"
          else
            NOTIFY_URL="$FAILURE_BARK_URL"
            printf -v BODY 'iOS Ad Hoc 工作流失败。\n分支: %s\nBuild: #%s\nBuild 结果: %s\nDeploy: %s' "$REF_NAME" "$GITHUB_RUN_NUMBER" "$BUILD_RESULT" "$DEPLOY_RESULT"
          fi

          CURL_ARGS=(
            --fail
            --silent
            --show-error
            -X POST
            "$NOTIFY_URL"
            -H 'Content-Type: application/x-www-form-urlencoded; charset=utf-8'
            --data-urlencode "body=${BODY}"
            --data-urlencode "group=GitHub Actions"
          )

          if [[ -n "${PAGE_URL:-}" && "$DEPLOY_RESULT" == "success" ]]; then
            CURL_ARGS+=(--data-urlencode "url=${PAGE_URL}")
          fi

          curl "${CURL_ARGS[@]}"
