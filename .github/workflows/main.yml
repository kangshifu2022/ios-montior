name: "iOS Build Pipeline"

on:
  workflow_dispatch:

jobs:
  build_ipa:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第一步：安装证书和描述文件
      - name: Install Apple Certificate and Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROV_BASE64: ${{ secrets.BUILD_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROV_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12
          security list-keychain -d user -s $KEYCHAIN_PATH

          # 提取 UUID
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          echo "PP_UUID=$UUID" >> $GITHUB_ENV

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # 第二步：针对 SPM 依赖的签名进行“暴力手术”
      # 强制所有包不签名，防止 Crypto 等库报错
      - name: Disable SPM Signing
        run: |
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidatation -bool YES
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES

      # 第三步：归档 (Archive)
      # 这里不再传入 PROVISIONING_PROFILE 环境变量，而是直接通过命令覆盖
      - name: xcodebuild Archive
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          xcodebuild archive \
            -project test/test.xcodeproj \
            -scheme test \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE=$PP_UUID \
            DEVELOPMENT_TEAM="UV3V49Y5ZZ" \
            -skipPackagePluginValidation \
            -skipMacroValidation

      # 第四步：导出 IPA
      - name: xcodebuild Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build/ipa

      # 第五步：上传产物
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-monitor-release
          path: ${{ runner.temp }}/build/ipa/*.ipa
