name: "iOS Build Pipeline"

on:
  workflow_dispatch:

jobs:
  build_ipa:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple Certificate and Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROV_BASE64: ${{ secrets.BUILD_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROV_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12

          # 提取 UUID 并安装到系统目录
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PP_UUID=$UUID" >> $GITHUB_ENV

      - name: Hard Reset Project Signing
        run: |
          # 这一步极其关键：从工程文件中抹除所有可能导致三方包误判的签名设置
          sed -i '' '/PROVISIONING_PROFILE/d' test/test.xcodeproj/project.pbxproj
          sed -i '' '/CODE_SIGN_STYLE/d' test/test.xcodeproj/project.pbxproj
          sed -i '' '/DEVELOPMENT_TEAM/d' test/test.xcodeproj/project.pbxproj

      - name: xcodebuild Archive
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          # 核心策略：
          # 1. 告诉 Xcode 默认不签名 (CODE_SIGNING_ALLOWED=NO)
          # 2. 仅针对主 Target (test) 开启签名并注入 UUID
          xcodebuild archive \
            -project test/test.xcodeproj \
            -scheme test \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \
            | xcpretty || true

          # 第二次运行：只对主 App 进行真正的签名补丁
          xcodebuild archive \
            -project test/test.xcodeproj \
            -scheme test \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE=$PP_UUID \
            DEVELOPMENT_TEAM=UV3V49Y5ZZ

      - name: xcodebuild Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build/ipa

      - name: Upload IPA Artifact
        uses: upload-artifact@v4
        with:
          name: ios-monitor-release
          path: ${{ runner.temp }}/build/ipa/*.ipa
