name: "iOS Build Pipeline"

on:
  workflow_dispatch: # 手动触发

jobs:
  build_ipa:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第一步：安装证书和描述文件
      - name: Install Apple Certificate and Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROV_BASE64: ${{ secrets.BUILD_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROV_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      # 第二步：归档 (Archive)
      # 关键修改：增加 AD_HOC_CODE_SIGNING_ALLOWED 和 DEVELOPMENT_TEAM 覆盖
      - name: xcodebuild Archive
        run: |
          xcodebuild archive \
            -project test/test.xcodeproj \
            -scheme test \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="test_adhoc" \
            DEVELOPMENT_TEAM="UV3V49Y5ZZ" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # 第三步：导出 IPA (Export)
      - name: xcodebuild Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build/ipa

      # 第四步：上传产物
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-monitor-release
          path: ${{ runner.temp }}/build/ipa/*.ipa
