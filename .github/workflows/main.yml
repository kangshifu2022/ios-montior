name: "iOS Build Pipeline"

on:
  workflow_dispatch:

jobs:
  build_ipa:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple Certificate and Provisioning Profile
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROV_BASE64: ${{ secrets.BUILD_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROV_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERT_PATH -k $KEYCHAIN_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12
          security list-keychain -d user -s $KEYCHAIN_PATH

          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          echo "PP_UUID=$UUID" >> $GITHUB_ENV
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # 【新增】强力清除工程中的签名残留，解决三方库冲突
      - name: Fix Signing for SPM
        run: |
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' test/test.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' test/test.xcodeproj/project.pbxproj
          # 清除所有具体的 Profile 指定，让命令行参数接管
          sed -i '' '/PROVISIONING_PROFILE =/d' test/test.xcodeproj/project.pbxproj
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER =/d' test/test.xcodeproj/project.pbxproj

      - name: xcodebuild Archive
        env:
          PP_UUID: ${{ env.PP_UUID }}
        run: |
          xcodebuild archive \
            -project test/test.xcodeproj \
            -scheme test \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -skipPackagePluginValidation \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE=$PP_UUID \
            DEVELOPMENT_TEAM="UV3V49Y5ZZ"

      - name: xcodebuild Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/test.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build/ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-monitor-release
          path: ${{ runner.temp }}/build/ipa/*.ipa
