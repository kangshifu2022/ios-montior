name: Verify iOS Certificates

on:
  workflow_dispatch: # 允许你手动在后台点按钮触发，不用改代码

jobs:
  verify:
    runs-on: macos-15
    steps:
      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Install Certificate
        env:
          P12_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          # 1. 还原证书
          echo -n "$P12_BASE64" | base64 --decode -o cert.p12
          
          # 2. 创建临时钥匙串
          security create-keychain -p "test" build.keychain
          security unlock-keychain -p "test" build.keychain
          
          # 3. 尝试导入证书
          # 如果这里报错，说明 P12 文件损坏或密码错误
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -A -t cert -f pkcs12
          
          # 4. 列出有效的签名标识符
          # 这是最关键的一步，如果你能在日志里看到 "iPhone Distribution: XXX"，说明成功了
          security find-identity -v -p codesigning build.keychain

      - name: Verify Provisioning Profile
        env:
          PROV_BASE64: ${{ secrets.BUILD_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # 1. 还原描述文件
          echo -n "$PROV_BASE64" | base64 --decode -o verify.mobileprovision
          
          # 2. 读取描述文件内容
          # 我们通过命令查看这个文件的过期时间、Team ID 等信息
          security cms -D -i verify.mobileprovision > profile_content.plist
          
          # 3. 提取关键信息打印出来（用于你肉眼比对）
          echo "--- Profile Details ---"
          grep -A 1 "Name" profile_content.plist | head -n 2
          grep -A 1 "TeamIdentifier" profile_content.plist | head -n 3
          echo "-----------------------"

  notify:
    needs: verify
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Bark notification
        env:
          BARK_PUSH_URL: https://api.day.app/7Gm7m5C7aYeiiZBxhP6koK/
          VERIFY_RESULT: ${{ needs.verify.result }}
        run: |
          if [[ -z "${BARK_PUSH_URL:-}" ]]; then
            echo "BARK_PUSH_URL is not set; skipping Bark notification."
            exit 0
          fi

          BARK_PUSH_URL="${BARK_PUSH_URL%/}"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          REF_NAME="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"

          case "$VERIFY_RESULT" in
            success)
              TITLE="iOS 证书校验成功"
              BODY=$'证书和描述文件校验完成。'"$'\n'"分支: ${REF_NAME}"$'\n'"Run: #${GITHUB_RUN_NUMBER}"$'\n'"Verify: ${VERIFY_RESULT}"
              ;;
            cancelled)
              TITLE="iOS 证书校验已取消"
              BODY=$'证书校验被取消。'"$'\n'"分支: ${REF_NAME}"$'\n'"Run: #${GITHUB_RUN_NUMBER}"$'\n'"Verify: ${VERIFY_RESULT}"
              ;;
            *)
              TITLE="iOS 证书校验失败"
              BODY=$'证书或描述文件校验失败。'"$'\n'"分支: ${REF_NAME}"$'\n'"Run: #${GITHUB_RUN_NUMBER}"$'\n'"Verify: ${VERIFY_RESULT}"
              ;;
          esac

          curl --fail --silent --show-error \
            -X POST "$BARK_PUSH_URL" \
            -H 'Content-Type: application/x-www-form-urlencoded; charset=utf-8' \
            --data-urlencode "title=${TITLE}" \
            --data-urlencode "body=${BODY}" \
            --data-urlencode "group=GitHub Actions" \
            --data-urlencode "url=${RUN_URL}"
