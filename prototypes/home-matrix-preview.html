<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统监控卡片设计</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-cyan: #06b6d4;
            --accent-purple: #a855f7;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* 核心比例控制：宽度400px，高度200px (1/2) */
        .monitor-card {
            width: 400px;
            height: 200px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        /* 顶部主机名 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .hostname {
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
        }

        .hostname::before {
            content: "";
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px #22c55e;
        }

        /* 主内容区布局 */
        .content {
            display: flex;
            flex: 1;
            gap: 16px;
        }

        /* 左侧：仪表盘 */
        .gauges {
            flex: 0 0 130px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .gauge-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.5s ease;
        }

        /* 右侧：网速与磁盘 */
        .stats {
            flex: 1;
            display: grid;
            grid-template-rows: 1fr 1fr;
            gap: 8px;
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 8px;
            padding: 8px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2px 0;
        }

        .stat-value {
            font-family: 'Courier New', monospace;
            color: var(--text-main);
            font-size: 0.85rem;
        }

        .unit {
            color: var(--text-dim);
            font-size: 0.7rem;
            margin-left: 2px;
        }

        .icon {
            font-size: 0.8rem;
            margin-right: 4px;
        }
    </style>
</head>
<body>

<div class="monitor-card">
    <div class="header">
        <div class="hostname">PROD-SERVER-01</div>
        <div class="label" style="font-size: 0.6rem;">Uptime: 12d 4h</div>
    </div>

    <div class="content">
        <div class="gauges">
            <div class="gauge-item">
                <div class="stat-row">
                    <span class="label">CPU</span>
                    <span class="stat-value" id="cpu-text">32%</span>
                </div>
                <div class="progress-bar">
                    <div id="cpu-bar" class="progress-fill" style="width: 32%; background: var(--accent-cyan);"></div>
                </div>
            </div>
            <div class="gauge-item">
                <div class="stat-row">
                    <span class="label">Memory</span>
                    <span class="stat-value" id="mem-text">64%</span>
                </div>
                <div class="progress-bar">
                    <div id="mem-bar" class="progress-fill" style="width: 64%; background: var(--accent-purple);"></div>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="label" style="margin-bottom: 4px;">Network</div>
                <div class="stat-row">
                    <span><span class="icon">↓</span><span class="label">DL</span></span>
                    <span class="stat-value">12.5 <span class="unit">MB/s</span></span>
                </div>
                <div class="stat-row">
                    <span><span class="icon">↑</span><span class="label">UL</span></span>
                    <span class="stat-value">1.2 <span class="unit">MB/s</span></span>
                </div>
            </div>
            <div class="stat-box" style="border-left: 2px solid var(--accent-cyan);">
                <div class="label" style="margin-bottom: 4px;">Disk I/O</div>
                <div class="stat-row">
                    <span><span class="icon">R</span></span>
                    <span class="stat-value">45.8 <span class="unit">MB/s</span></span>
                </div>
                <div class="stat-row">
                    <span><span class="icon">W</span></span>
                    <span class="stat-value">12.1 <span class="unit">MB/s</span></span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 简单的模拟动态效果
    setInterval(() => {
        const cpu = Math.floor(Math.random() * 20) + 20;
        const mem = Math.floor(Math.random() * 10) + 60;
        
        document.getElementById('cpu-bar').style.width = cpu + '%';
        document.getElementById('cpu-text').innerText = cpu + '%';
        
        document.getElementById('mem-bar').style.width = mem + '%';
        document.getElementById('mem-text').innerText = mem + '%';
    }, 2000);
</script>

</body>
</html>
