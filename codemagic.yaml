workflows:
  ios-adhoc:
    name: iOS Ad Hoc
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: testonly

    environment:
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.wenchaoliu.test
      vars:
        XCODE_PROJECT: "test/test.xcodeproj"
        XCODE_SCHEME: "test"
        BUNDLE_ID: "com.wenchaoliu.test"
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    scripts:
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Install Metal Toolchain
        script: |
          xcodebuild -downloadComponent MetalToolchain

      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "Setting build number to: $BUILD_NUMBER"
          sed -i "" "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $BUILD_NUMBER/g" "$CM_BUILD_DIR/test/test.xcodeproj/project.pbxproj"

      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - linus_liu@qq.com
        notify:
          success: true
          failure: true
