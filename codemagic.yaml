workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: testonly

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.wenchaoliu.test
      vars:
        XCODE_PROJECT: "test/test.xcodeproj"
        XCODE_SCHEME: "test"
        BUNDLE_ID: "com.wenchaoliu.test"
        APP_STORE_APPLE_ID: 6761410448
      xcode: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    scripts:
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo "17")
          NEW_BUILD_NUMBER=$(($LATEST_BUILD_NUMBER + 1))
          echo "Setting build number to: $NEW_BUILD_NUMBER"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW_BUILD_NUMBER" "$CM_BUILD_DIR/test/test/Info.plist"
          echo "Done. Current value:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$CM_BUILD_DIR/test/test/Info.plist"

      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - linus_liu@qq.com
        notify:
          success: true
          failure: true